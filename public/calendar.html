<main class="page-wrap">

  <h1 class="page-title"><span class="icon">📅</span> Events Calendar</h1>
  <p class="page-subtitle">Upcoming voyages, gatherings, and club events.</p>

  <!-- ============================================================
       GOOGLE CALENDAR EMBED
       ============================================================
       HOW TO ADD YOUR CALENDAR:
       1. Go to calendar.google.com
       2. Click the three dots next to your calendar name → "Settings and sharing"
       3. Scroll down to "Integrate calendar"
       4. Copy the embed code (the full <iframe> tag)
       5. Replace the placeholder <div> below with your <iframe> tag
       ============================================================ -->

  <!-- PLACEHOLDER — replace this entire block with your Google Calendar iframe -->
  <div style="width:100%; overflow:hidden; border-radius:12px; margin-bottom:24px;">
    <iframe src="https://calendar.google.com/calendar/embed?src=b935737fb267a6ae37cd2cc699860e09f5428706a6c70bbd45bb0c21141cebba%40group.calendar.google.com&ctz=America%2FChicago" style="border: 0; width:100%; min-height:600px;" frameborder="0" scrolling="no"></iframe>
  </div>
  <div style="text-align:center; margin-bottom:32px;">
    <a href="https://calendar.google.com/calendar/ical/b935737fb267a6ae37cd2cc699860e09f5428706a6c70bbd45bb0c21141cebba%40group.calendar.google.com/public/basic.ics"
       style="background-color:#B8860B; color:white; padding:12px 28px; border-radius:8px; text-decoration:none; font-size:1rem; font-weight:bold;">
      📅 Download iCal / Add to My Calendar
    </a>
  </div>

  <!-- Once you replace the placeholder above, the calendar will display here -->
